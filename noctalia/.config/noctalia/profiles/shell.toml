[shell]
app_icon_colorize     = false           # 在整个 Shell 中重新着色应用图标

[shell.panel]
transparency_mode     = "soft"          # solid | soft | glass；控制浮动/居中面板的不透明度与卡片半透明度


# 会话面板
[[shell.session.actions]]
action = "lock"
countdown_seconds = 5.0
enabled = true
shortcut = "1"
variant = "default"

[[shell.session.actions]]
action = "logout"
countdown_seconds = 5.0
enabled = true
shortcut = "2"
variant = "default"

[[shell.session.actions]]
action = "lock_and_suspend"
countdown_seconds = 5.0
enabled = true
shortcut = "3"
variant = "default"

[[shell.session.actions]]
action = "reboot"
countdown_seconds = 5.0
enabled = true
shortcut = "4"
variant = "default"

[[shell.session.actions]]
action = "shutdown"
countdown_seconds = 5.0
enabled = true
shortcut = "5"
variant = "destructive"

[osd]
position = "top_center"  # top_right | top_left | top_center | bottom_right | bottom_left | bottom_center | center_right | center_left
position_vertical = "top_center"  # 相同的选项；当 orientation = "vertical" 时使用
orientation = "horizontal" # horizontal | vertical (仅音量/亮度滑块)
background_opacity = 0.95 # OSD 弹出窗口的背景不透明度
border = true            # OSD 弹出卡片周围的轮廓；设为 false 则无边框

